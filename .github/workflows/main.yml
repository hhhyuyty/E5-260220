name: Check Microsoft E5 2605

on:
  schedule:
    # 每小时第 3 分钟运行一次，例如 00:03、01:03、02:03
    - cron: '3 */1 * * *'

  # 允许在 GitHub Actions 页面手动运行
  workflow_dispatch:

jobs:
  check-expiry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates

          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list

          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          google-chrome --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade selenium
          pip install requests

      - name: Run E5 Expiry Check Script
        env:
          MS_E5_ACCOUNTS: ${{ secrets.MS_E5_ACCOUNTS }}

          # 如果你用 pushplus 推送，取消下面这一行注释
          # PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}

          # 如果你用 Telegram 推送，取消下面两行注释
          # TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          # TG_USER_ID: ${{ secrets.TG_USER_ID }}

        run: python check_e5_expiry.py

      - name: Upload Debug Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: ./*.png
          if-no-files-found: ignore

